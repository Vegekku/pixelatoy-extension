<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pixelatoy — Opciones</title>
  <style>
    body { font-family: sans-serif; font-size: 14px; max-width: 600px; margin: 32px auto; padding: 0 16px; color: #333; }
    h1 { font-size: 18px; margin-bottom: 24px; }
    h2 { font-size: 14px; margin: 24px 0 10px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .row label { flex: 1; }
    .threshold-row { display: grid; grid-template-columns: 1fr 80px 80px 80px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .threshold-row span { font-size: 12px; color: #666; text-align: center; }
    input[type=number] { width: 70px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; }
    input[type=color] { width: 48px; height: 28px; padding: 1px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; }
    .preview { display: inline-block; width: 80px; padding: 2px 6px; border-radius: 3px; text-align: center; font-size: 12px; margin-left: 8px; }
    .actions { margin-top: 28px; display: flex; gap: 10px; }
    button { padding: 7px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    #save { background: #5cb85c; color: #fff; }
    #reset { background: #f0ad4e; color: #000; }
    #status { margin-top: 12px; font-size: 13px; color: #5cb85c; min-height: 18px; }
  </style>
</head>
<body>
  <h1 id="title">Opciones</h1>

  <h2 id="h-general">General</h2>
  <div class="row"><label id="l-notifications">Notificaciones push</label><input type="checkbox" id="notifications"></div>
  <div class="row"><label id="l-popup">Popup del icono</label><input type="checkbox" id="popup"></div>
  <div class="row"><label id="l-tabs">Pestañas En almacén / No disponible</label><input type="checkbox" id="tabs"></div>
  <div class="row"><label id="l-default-tab">Pestaña por defecto</label>
    <select id="defaultTab">
      <option value="warehouse" id="opt-warehouse">En almacén</option>
      <option value="unavailable" id="opt-unavailable">No disponible</option>
    </select>
  </div>
  <div class="row"><label id="l-instructions">Instrucciones expandidas por defecto</label><input type="checkbox" id="instructionsOpen"></div>

  <h2 id="h-urgency">Umbrales de urgencia</h2>
  <div class="threshold-row">
    <span></span><span id="h-days">Días</span><span id="h-bg">Fondo</span><span id="h-text">Texto</span>
  </div>
  <div id="thresholds"></div>

  <div class="actions">
    <button id="save">Guardar</button>
    <button id="reset">Restablecer</button>
  </div>
  <div id="status"></div>

  <script src="options.js" type="module"></script>
</body>
</html>
