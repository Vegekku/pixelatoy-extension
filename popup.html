<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; font-family: system-ui, sans-serif; font-size: 13px; margin: 0; padding: 12px; }
    h3 { margin: 0 0 10px; font-size: 14px; }
    .range { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 4px; margin-bottom: 6px; cursor: pointer; }
    .range:hover { background: #f0f0f0; }
    .arrow { font-size: 10px; transition: transform 0.2s; }
    .arrow.open { transform: rotate(90deg); }
    .products { display: none; padding: 6px 0; }
    .products.open { display: flex; flex-wrap: wrap; gap: 6px; }
    .products img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    .products .no-img { width: 48px; height: 48px; border-radius: 4px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; background: #f5f5f5; }
    .range .count { font-weight: bold; margin-left: auto; }
    .dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .empty { color: #666; text-align: center; padding: 16px 0; }
    .btn { display: block; width: 100%; margin-top: 10px; padding: 8px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: center; box-sizing: border-box; text-decoration: none; }
    .btn:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h3>Reservas en almacén</h3>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
